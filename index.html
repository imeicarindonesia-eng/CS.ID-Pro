<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS.ID - Aplikasi Data Samsat Nasional</title>
    
    <!-- PWA Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        :root {
            --bg-dark: #000000;
            --bg-light: #121212;
            --gold: #FFD700;
            --gold-dim: #B8860B;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #080808; color: white; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 420px; background: var(--bg-dark); border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* --- LOGIN SECTION --- */
        .login-screen { padding: 50px 25px; text-align: center; flex: 1; }
        .logo-area { margin-bottom: 40px; }
        .logo-area h1 { font-size: 3.5em; font-weight: 800; color: var(--gold); letter-spacing: 2px; }
        .logo-area p { color: var(--gold); font-size: 0.8em; letter-spacing: 3px; font-weight: 600; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; color: var(--gold); font-size: 0.7em; font-weight: 800; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 16px; background: #111; border: 1px solid #333; border-radius: 12px; color: white; outline: none; }
        .form-group input:focus { border-color: var(--gold); }

        .btn-main { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), var(--gold-dim)); border: none; border-radius: 12px; font-weight: 800; color: black; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* --- DASHBOARD SECTION --- */
        .header { padding: 20px; background: var(--bg-light); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { color: var(--gold); font-size: 1.1em; }
        
        .content { padding: 20px; flex: 1; }
        .plate-display { background: #000; border: 2px solid var(--gold); padding: 25px; text-align: center; font-size: 2.5em; font-weight: 900; color: var(--gold); border-radius: 15px; min-height: 100px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); margin-bottom: 30px; }

        /* Keyboard */
        .kb-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
        .key { background: #222; padding: 15px 0; text-align: center; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1.2em; border: 1px solid #333; }
        .key:active { background: var(--gold); color: black; }
        .key-del { grid-column: span 2; background: #333; color: #ff4d4d; }
        .key-search { grid-column: span 10; background: var(--gold); color: black; padding: 18px; margin-top: 10px; border-radius: 12px; font-size: 0.9em; }

        /* Navigation Bar */
        .nav { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: var(--bg-light); border-top: 1px solid var(--border); }
        .nav-item { color: #666; text-align: center; font-size: 0.7em; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <!-- HALAMAN 1: LOGIN -->
    <div id="scr-login" class="login-screen">
        <div class="logo-area">
            <h1>CS.ID</h1>
            <p>DATA SAMSAT NASIONAL</p>
        </div>
        
        <div class="form-group">
            <label>ID AGEN</label>
            <input type="text" id="userid" placeholder="Masukkan ID Anda">
        </div>
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="userpass" placeholder="********">
        </div>
        <button class="btn-main" onclick="handleLogin()">Masuk Sistem</button>
        <p style="margin-top: 30px; font-size: 0.75em; color: #666;">Butuh bantuan akses? <span style="color:var(--gold)">Hubungi Admin</span></p>
    </div>

    <!-- HALAMAN 2: DASHBOARD (AWALNYA TERSEMBUNYI) -->
    <div id="scr-dash" class="hidden">
        <div class="header">
            <h2>CS.ID SAMSAT</h2>
            <div style="font-size: 0.7em; text-align: right;">User: <b id="display-name" style="color:var(--gold)"></b></div>
        </div>

        <div class="content">
            <p style="color:var(--gold); font-size: 0.7em; font-weight: 800; margin-bottom: 10px;">MASUKKAN PLAT NOMOR:</p>
            <div id="plate-output" class="plate-display"></div>

            <div class="kb-grid">
                <!-- Row Angka -->
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div><div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div><div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div><div class="key" onclick="press('0')">0</div>
                <!-- Row Huruf -->
                <div class="key" onclick="press('A')">A</div><div class="key" onclick="press('B')">B</div><div class="key" onclick="press('D')">D</div><div class="key" onclick="press('E')">E</div><div class="key" onclick="press('F')">F</div><div class="key" onclick="press('G')">G</div><div class="key" onclick="press('H')">H</div><div class="key" onclick="press('L')">L</div><div class="key" onclick="press('N')">N</div><div class="key" onclick="press('T')">T</div>
                <div class="key" onclick="press('Z')">Z</div><div class="key" onclick="press('K')">K</div><div class="key" onclick="press('P')">P</div><div class="key" onclick="press('S')">S</div><div class="key" onclick="press('W')">W</div>
                <div class="key key-del" onclick="del()">DEL</div>
                <div class="key key-search" onclick="search()">CARI DATA KENDARAAN</div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active"><i data-lucide="search"></i><br>Cek Plat</div>
            <div class="nav-item" onclick="location.reload()"><i data-lucide="log-out"></i><br>Logout</div>
        </div>
    </div>
</div>

<script>
    // Jalankan Ikon
    lucide.createIcons();

    let plateText = "";

    // Fungsi Login
    function handleLogin() {
        const id = document.getElementById('userid').value;
        const pass = document.getElementById('userpass').value;

        // Aturan: Password harus 123
        if(pass === "123") {
            document.getElementById('scr-login').classList.add('hidden');
            document.getElementById('scr-dash').classList.remove('hidden');
            document.getElementById('display-name').innerText = id.toUpperCase() || "AGENT-01";
        } else {
            alert("Akses Ditolak! Gunakan password: 123");
        }
    }

    // Fungsi Keyboard
    function press(val) {
        if(plateText.length < 10) {
            plateText += val;
            document.getElementById('plate-output').innerText = plateText;
        }
    }

    function del() {
        plateText = plateText.slice(0, -1);
        document.getElementById('plate-output').innerText = plateText;
    }

    function search() {
        if(plateText.length < 3) return alert("Masukkan plat nomor lengkap!");
        alert("🔍 MENCARI DATA PLAT: " + plateText + "\n\nSistem sedang menghubungkan ke server Samsat...");
    }
</script>

</body>
</html>
