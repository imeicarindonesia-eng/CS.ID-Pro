<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS.ID - Aplikasi Data Samsat Nasional</title>
    
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        :root {
            --bg-dark: #000000;
            --bg-light: #121212;
            --gold: #FFD700;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #080808; color: white; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 420px; background: var(--bg-dark); border: 1px solid var(--border); position: relative; }
        .hidden { display: none !important; }

        /* --- LOGIN --- */
        .login-screen { padding: 50px 25px; text-align: center; }
        .logo-area h1 { font-size: 3.5em; font-weight: 800; color: var(--gold); }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; color: var(--gold); font-size: 0.7em; font-weight: 800; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 16px; background: #111; border: 1px solid #333; border-radius: 12px; color: white; outline: none; }
        .btn-main { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 12px; font-weight: 800; color: black; cursor: pointer; }

        /* --- DASHBOARD --- */
        .header { padding: 20px; background: var(--bg-light); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { color: var(--gold); font-size: 1.1em; }
        
        .content { padding: 20px; }
        .plate-display { background: #000; border: 2px solid var(--gold); padding: 25px; text-align: center; font-size: 2.2em; font-weight: 900; color: var(--gold); border-radius: 15px; min-height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; letter-spacing: 2px; }

        /* Keyboard */
        .kb-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
        .key { background: #222; padding: 15px 0; text-align: center; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1.2em; border: 1px solid #333; }
        .key:active { background: var(--gold); color: black; }
        .key-del { grid-column: span 2; background: #333; color: #ff4d4d; }
        .key-search { grid-column: span 10; background: var(--gold); color: black; padding: 18px; margin-top: 10px; border-radius: 12px; font-weight: bold; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 420px; display: flex; justify-content: space-around; padding: 15px; background: var(--bg-light); border-top: 1px solid var(--border); }
        .nav-item { color: #666; text-align: center; font-size: 0.7em; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <!-- HALAMAN LOGIN -->
    <div id="scr-login" class="login-screen">
        <div class="logo-area"><h1>CS.ID</h1><p style="color:var(--gold); font-weight:bold; letter-spacing:2px;">SAMSAT NASIONAL</p></div>
        <div class="form-group" style="margin-top:40px;"><label>ID AGEN</label><input type="text" id="userid" placeholder="Masukkan ID"></div>
        <div class="form-group"><label>PASSWORD</label><input type="password" id="userpass" placeholder="********"></div>
        <button class="btn-main" onclick="handleLogin()">MASUK SISTEM</button>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="scr-dash" class="hidden">
        <div class="header">
            <h2>CS.ID SAMSAT</h2>
            <div style="font-size: 0.7em;">User: <b id="display-name" style="color:var(--gold)">HENDRA</b></div>
        </div>

        <div class="content">
            <p style="color:var(--gold); font-size: 0.7em; font-weight: 800; margin-bottom: 10px;">MASUKKAN PLAT NOMOR:</p>
            <div id="plate-output" class="plate-display"></div>

            <div class="kb-grid">
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div><div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div><div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div><div class="key" onclick="press('0')">0</div>
                <div class="key" onclick="press('A')">A</div><div class="key" onclick="press('B')">B</div><div class="key" onclick="press('D')">D</div><div class="key" onclick="press('E')">E</div><div class="key" onclick="press('F')">F</div><div class="key" onclick="press('G')">G</div><div class="key" onclick="press('H')">H</div><div class="key" onclick="press('L')">L</div><div class="key" onclick="press('N')">N</div><div class="key" onclick="press('T')">T</div>
                <div class="key" onclick="press('Z')">Z</div><div class="key" onclick="press('K')">K</div><div class="key" onclick="press('P')">P</div><div class="key" onclick="press('S')">S</div><div class="key" onclick="press('W')">W</div>
                <div class="key key-del" onclick="del()">DEL</div>
                <div class="key key-search" onclick="search()">CARI DATA KENDARAAN</div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active"><p>Cek Plat</p></div>
            <div class="nav-item" onclick="location.reload()"><p>Logout</p></div>
        </div>
    </div>
</div>

<script>
    let plateText = "";

    function handleLogin() {
        const id = document.getElementById('userid').value;
        const pass = document.getElementById('userpass').value;
        if(pass === "123") {
            document.getElementById('scr-login').classList.add('hidden');
            document.getElementById('scr-dash').classList.remove('hidden');
            document.getElementById('display-name').innerText = id.toUpperCase() || "HENDRA";
        } else {
            alert("Password Salah! Gunakan: 123");
        }
    }

    function press(val) {
        if(plateText.length < 10) {
            plateText += val;
            document.getElementById('plate-output').innerText = plateText;
        }
    }

    function del() {
        plateText = plateText.slice(0, -1);
        document.getElementById('plate-output').innerText = plateText;
    }

    function search() {
        if(plateText === "") return alert("Masukkan plat nomor!");
        alert("🔍 Mencari Data Plat: " + plateText);
    }
</script>

</body>
</html>
