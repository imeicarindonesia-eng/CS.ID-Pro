<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS.ID - Data Samsat Nasional</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://unpkg.com"></script>
    
    <style>
        @import url('https://googleapis.com');

        :root {
            --bg-dark: #000000;
            --bg-light: #121212;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --gold-primary: #FFD700;
            --danger: #ff4d4d;
            --success: #2ecc71;
            --border-color: #2a2a2a;
            --font-family: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-family);
            background-color: #080808;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        .header {
            background-color: var(--bg-light);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--gold-primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .content-area { flex-grow: 1; padding: 20px; padding-bottom: 30px; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #plateView {
            background: #000;
            border: 2px solid var(--gold-primary);
            padding: 22px;
            text-align: center;
            color: var(--gold-primary);
            font-size: 1.8em;
            font-weight: 900;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kb-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .kb-alpha { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .key {
            background: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
        .key:active { background: var(--gold-primary); color: #000; }
        .key-action { background: var(--gold-primary); color: #000; grid-column: span 2; }
        .key-search { background: var(--success); color: #fff; grid-column: span 4; font-weight: 900; }

        .res-banner { background: var(--gold-primary); color: #000; padding: 15px; font-weight: 900; text-align: center; letter-spacing: 2px; }
        .res-section-title { color: var(--gold-primary); font-size: 0.9em; font-weight: 800; margin: 20px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .res-line { display: flex; margin-bottom: 8px; font-size: 0.85em; }
        .res-label { width: 130px; color: var(--text-secondary); flex-shrink: 0; }
        .res-val { color: #fff; font-weight: 600; flex: 1; text-transform: uppercase; }

        .loader { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .wa-btn { background: #25D366; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color:var(--gold-primary); font-size:1.4em;">CS.ID SAMSAT</h1>
        <div style="font-size: 0.7em; color: var(--gold-primary);">USER: HENDRY</div>
    </div>

    <div class="content-area">
        <!-- HALAMAN CARI -->
        <div id="searchPage" class="fade-in">
            <p style="font-size: 0.7em; color: var(--gold-primary); margin-bottom: 10px; font-weight: 800;">INPUT PLAT / RANGKA / MESIN :</p>
            <div id="plateView">MULAI KETIK...</div>

            <div class="kb-grid">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div><div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div><div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div><div class="key" onclick="pressKey('0')">0</div>
            </div>

            <div class="kb-alpha">
                <div class="key" onclick="pressKey('A')">A</div><div class="key" onclick="pressKey('B')">B</div><div class="key" onclick="pressKey('C')">C</div><div class="key" onclick="pressKey('D')">D</div><div class="key" onclick="pressKey('E')">E</div><div class="key" onclick="pressKey('F')">F</div>
                <div class="key" onclick="pressKey('G')">G</div><div class="key" onclick="pressKey('H')">H</div><div class="key" onclick="pressKey('I')">I</div><div class="key" onclick="pressKey('J')">J</div><div class="key" onclick="pressKey('K')">K</div><div class="key" onclick="pressKey('L')">L</div>
                <div class="key" onclick="pressKey('M')">M</div><div class="key" onclick="pressKey('N')">N</div><div class="key" onclick="pressKey('O')">O</div><div class="key" onclick="pressKey('P')">P</div><div class="key" onclick="pressKey('Q')">Q</div><div class="key" onclick="pressKey('R')">R</div>
                <div class="key" onclick="pressKey('S')">S</div><div class="key" onclick="pressKey('T')">T</div><div class="key" onclick="pressKey('U')">U</div><div class="key" onclick="pressKey('V')">V</div><div class="key" onclick="pressKey('W')">W</div><div class="key" onclick="pressKey('X')">X</div>
                <div class="key" onclick="pressKey('Y')">Y</div><div class="key" onclick="pressKey('Z')">Z</div>
                <div class="key key-action" onclick="delKey()">HAPUS</div>
                <div class="key key-search" onclick="fetchSamsat()">CARI DATA SEKARANG</div>
            </div>
        </div>

        <!-- HALAMAN HASIL -->
        <div id="resultPage" class="hidden fade-in">
            <div id="resultContent"></div>
            <button class="btn" style="background:#333; color:white; margin-top:15px; padding:12px; border-radius:8px; border:none; width:100%; font-weight:700;" onclick="location.reload()">CARI DATA LAIN</button>
        </div>
    </div>
</div>

<script>
    let currentInput = "";
    window.lastData = null;

    function pressKey(val) {
        if (currentInput.length < 20) {
            currentInput += val;
            document.getElementById('plateView').innerText = currentInput;
        }
    }

    function delKey() {
        currentInput = currentInput.slice(0, -1);
        document.getElementById('plateView').innerText = currentInput || "MULAI KETIK...";
    }

    const fetchSamsat = async () => {
        if (!currentInput) { alert("Input Kosong!"); return; }

        document.getElementById('searchPage').classList.add('hidden');
        document.getElementById('resultPage').classList.remove('hidden');
        const container = document.getElementById('resultContent');

        container.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; padding:60px 0;">
                                   <div class="loader"></div>
                                   <p style="margin-top:20px; color:var(--gold-primary); font-weight:800;">SEDANG MENGAMBIL DATA...</p>
                               </div>`;

        try {
            const API_KEY = "9611bbce88d6dbd96cdfd83619233efb";
            const API_BASE = "https://elangninja.space";
            const res = await fetch(`${API_BASE}?key=${API_KEY}&s=${currentInput.toUpperCase()}`);
            const data = await res.json();

            if (data && data.length > 0) {
                window.lastData = data[0];
                renderResult(data[0]);
            } else {
                container.innerHTML = `<div style="padding:50px 20px; text-align:center; color:var(--danger); border:1px solid #333; border-radius:12px; font-weight:800;">DATA TIDAK DITEMUKAN</div>`;
            }
        } catch (e) {
            container.innerHTML = `<div style="padding:50px 20px; text-align:center; color:var(--danger);">GAGAL TERHUBUNG KE SERVER</div>`;
        }
    };

    function renderResult(d) {
        const container = document.getElementById('resultContent');
        const up = (t) => (t ? t.toString().toUpperCase() : '-');

        container.innerHTML = `
            <div class="fade-in" style="border:1px solid var(--gold-primary); border-radius:15px; overflow:hidden;">
                <div class="res-banner">APLIKASI CS.ID</div>
                <div style="padding:20px;">
                    <div class="res-section-title">IDENTITAS PEMILIK : ⬇️</div>
                    <div class="res-line"><span class="res-label">NO. POLISI</span><span class="res-val">: ${up(d.nopol)}</span></div>
                    <div class="res-line"><span class="res-label">PEMILIK</span><span class="res-val">: ${up(d.nama_pemilik)}</span></div>
                    <div class="res-line"><span class="res-label">ALAMAT</span><span class="res-val">: ${up(d.alamat)}</span></div>
                    <div class="res-line"><span class="res-label">NIK</span><span class="res-val">: ${up(d.nik)}</span></div>
                    <div class="res-line"><span class="res-label">PEKERJAAN</span><span class="res-val">: ${up(d.pekerjaan)}</span></div>
                    
                    <div class="res-section-title">DATA KENDARAAN : ⬇️</div>
                    <div class="res-line"><span class="res-label">MEREK</span><span class="res-val">: ${up(d.merk)}</span></div>
                    <div class="res-line"><span class="res-label">TIPE</span><span class="res-val">: ${up(d.tipe)}</span></div>
                    <div class="res-line"><span class="res-label">TAHUN</span><span class="res-val">: ${up(d.tahun)}</span></div>
                    <div class="res-line"><span class="res-label">WARNA</span><span class="res-val">: ${up(d.warna)}</span></div>
                    <div class="res-line"><span class="res-label">SILINDER</span><span class="res-val">: ${up(d.isi_silinder)} CC</span></div>
                    <div class="res-line"><span class="res-label">RODA</span><span class="res-val">: ${up(d.jumlah_roda)}</span></div>
                    <div class="res-line"><span class="res-label">NO. RANGKA</span><span class="res-val">: ${up(d.no_rangka)}</span></div>
                    <div class="res-line"><span class="res-label">NO. MESIN</span><span class="res-val">: ${up(d.no_mesin)}</span></div>
                    
                    <div class="res-section-title">DOKUMEN RESMI : ⬇️</div>
                    <div class="res-line"><span class="res-label">NO. BPKB</span><span class="res-val">: ${up(d.no_bpkb)}</span></div>
                    <div class="res-line"><span class="res-label">NO. STNK</span><span class="res-val">: ${up(d.no_stnk)}</span></div>
                    <div class="res-line"><span class="res-label">TANGGAL DAFTAR</span><span class="res-val">: ${up(d.tgl_daftar)}</span></div>

                    <div style="margin-top:20px; padding:12px; border:1px dashed var(--gold-primary); font-size:0.75em; line-height:1.5;">
                        <span style="color:var(--gold-primary); font-weight:800;">NOTE : 📓</span><br>
                        ALAT UNTUK MENGUNGKAPKAN IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH.
                    </div>

                    <div style="margin-top:15px; text-align:center; font-size:0.75em;">
                        <span style="color:var(--text-secondary);">CP LINK APLIKASI : CS.ID 👥</span><br>
                        <a href="https://wa.me" style="color:var(--gold-primary); text-decoration:none; font-weight:800;">https://wa.me</a>
                    </div>

                    <button class="wa-btn" onclick="shareWA()">
                        BAGIKAN KE WHATSAPP 📲
                    </button>
                </div>
            </div>`;
    }

    function shareWA() {
        const d = window.lastData;
        if(!d) return;
        const up = (t) => (t ? t.toString().toUpperCase() : '-');
        
        let m = `*APLIKASI CS.ID*\n\n`;
        m += `*IDENTITAS PEMILIK :* ⬇️\n`;
        m += `NO. POLISI : ${up(d.nopol)}\nPEMILIK : ${up(d.nama_pemilik)}\nALAMAT : ${up(d.alamat)}\nNIK : ${up(d.nik)}\nPEKERJAAN : ${up(d.pekerjaan)}\n\n`;
        m += `*DATA KENDARAAN :* ⬇️\n`;
        m += `MEREK : ${up(d.merk)}\nTIPE : ${up(d.tipe)}\nTAHUN : ${up(d.tahun)}\nWARNA : ${up(d.warna)}\nSILINDER : ${up(d.isi_silinder)} CC\nRODA : ${up(d.jumlah_roda)}\nNO. RANGKA : ${up(d.no_rangka)}\nNO. MESIN : ${up(d.no_mesin)}\n\n`;
        m += `*DOKUMEN RESMI :* ⬇️\n`;
        m += `NO. BPKB : ${up(d.no_bpkb)}\nNO. STNK : ${up(d.no_stnk)}\nTANGGAL DAFTAR : ${up(d.tgl_daftar)}\n\n`;
        m += `*NOTE :* 📓\nALAT UNTUK MENGUNGKAPKAN IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH.\n\n`;
        m += `*CP LINK APLIKASI : CS.ID* 👥\nhttps://wa.me`;

        window.open(`https://wa.me{encodeURIComponent(m)}`, '_blank');
    }
</script>
</body>
</html>
